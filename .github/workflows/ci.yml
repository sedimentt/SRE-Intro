name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    if: "!startsWith(github.event.head_commit.message, 'ci:')"
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build gateway image
        run: docker build -t ghcr.io/sedimentt/quickticket-gateway:${{ github.sha }} ./app/gateway

      - name: Build events image
        run: docker build -t ghcr.io/sedimentt/quickticket-events:${{ github.sha }} ./app/events

      - name: Build payments image
        run: docker build -t ghcr.io/sedimentt/quickticket-payments:${{ github.sha }} ./app/payments

      - name: Push gateway image
        run: docker push ghcr.io/sedimentt/quickticket-gateway:${{ github.sha }}

      - name: Push events image
        run: docker push ghcr.io/sedimentt/quickticket-events:${{ github.sha }}

      - name: Push payments image
        run: docker push ghcr.io/sedimentt/quickticket-payments:${{ github.sha }}

      - name: Update image tags in manifests
        run: |
          SHA=${{ github.sha }}

          sed -i "s|image: ghcr.io/.*/quickticket-gateway:.*|image: ghcr.io/sedimentt/quickticket-gateway:${SHA}|" k8s/gateway.yaml

          sed -i "s|image: ghcr.io/.*/quickticket-events:.*|image: ghcr.io/sedimentt/quickticket-events:${SHA}|" k8s/events.yaml

          sed -i "s|image: ghcr.io/.*/quickticket-payments:.*|image: ghcr.io/sedimentt/quickticket-payments:${SHA}|" k8s/payments.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/

          git diff --cached --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"

          git push