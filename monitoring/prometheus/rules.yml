groups:
  - name: slo_rules
    interval: 30s
    rules:
      # YOUR TASK: Create 3 recording rules:
      # 1. gateway:sli_availability:ratio_rate5m — availability SLI
      # 2. gateway:sli_latency_500ms:ratio_rate5m — latency SLI
      # 3. gateway:error_budget_burn_rate:ratio_rate5m — burn rate (>1 = burning too fast)
      #
      # Hint: availability = rate(non-5xx) / rate(total)
      # Hint: latency = rate(bucket le=0.5) / rate(count)
      # Hint: burn_rate = (1 - availability) / (1 - 0.995)
      - record: gateway:sli_availability:ratio_rate5m
        expr: |
          sum(rate(gateway_requests_total{status!~"5.."}[5m]))
          /
          sum(rate(gateway_requests_total[5m]))
      - record: gateway:sli_latency_500ms:ratio_rate5m
        expr: |
          sum(rate(gateway_request_duration_seconds_bucket{le="0.5"}[5m]))
          /
          sum(rate(gateway_request_duration_seconds_count[5m]))
      - record: gateway:error_budget_burn_rate:ratio_rate5m
        expr: |
          (1 - gateway:sli_availability:ratio_rate5m)
          /
          (1 - 0.995)